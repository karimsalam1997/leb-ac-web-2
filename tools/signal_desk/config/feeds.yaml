# =============================================================================
# SOURCES: the diet. Bias notes are part of the product: the brief should show
# the reader where a claim came from, not launder every source into one voice.
# =============================================================================

feeds:
  - name: "L'Orient Today"
    kind: "html_index"
    url: "https://today.lorientlejour.com/"
    lang: "en"
    bias: "Lebanese, francophone-establishment, anti-Hezbollah lean, reliable on detail"
    tier: 1
    terms: ["Lebanon", "Hezbollah", "Israel", "Nabatieh", "south", "Beirut", "ceasefire", "Iran", "war", "border"]
    limit: 18

  - name: "Naharnet"
    url: "https://news.google.com/rss/search?q=site%3Anaharnet.com%20Lebanon%20Hezbollah%20OR%20Israel&hl=en-US&gl=US&ceid=US%3Aen"
    lang: "en"
    bias: "Lebanese aggregator, broadly March-14 adjacent, routed through Google News because its RSS endpoint is unavailable"
    tier: 2

  - name: "Al Jazeera (Middle East)"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    lang: "en"
    bias: "Qatari state-funded, sympathetic to Islamist/resistance framing"
    tier: 1

  - name: "Middle East Eye"
    url: "https://news.google.com/rss/search?q=site%3Amiddleeasteye.net%20Lebanon%20Hezbollah%20OR%20Israel&hl=en-US&gl=US&ceid=US%3Aen"
    lang: "en"
    bias: "Qatar-aligned, critical of Gulf monarchies and Israel, routed through Google News because the RSS endpoint is inconsistent"
    tier: 2

  - name: "The Times of Israel"
    url: "https://www.timesofisrael.com/feed/"
    lang: "en"
    bias: "Israeli, security-establishment perspective, strong on IDF/intel"
